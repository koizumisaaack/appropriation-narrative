<!DOCTYPE html>

  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; }

    .gif-item {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .gif-item.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .gif-item img {
      max-width: 500px;
      max-height: 350px;
      border-radius: 8px;
      object-fit: contain;
    }

    #scroll-indicator {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: #fff;
      font-family: sans-serif;
      font-size: 13px;
      opacity: 1;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }

    #scroll-indicator.hidden {
      opacity: 0;
    }

    #scroll-indicator .arrow {
      width: 20px;
      height: 20px;
      border-right: 2px solid #fff;
      border-bottom: 2px solid #fff;
      transform: rotate(45deg);
      animation: bounce 1.2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: rotate(45deg) translateY(0); }
      50% { transform: rotate(45deg) translateY(5px); }
    }
  </style>
</head>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        } else {
          entry.target.classList.remove('visible');
        }
      });
    }, { threshold: 0.3 });

    document.querySelectorAll('.gif-item').forEach(el => observer.observe(el));

    // Hide indicator when user reaches the last gif
    const indicator = document.getElementById('scroll-indicator');
    const gifItems = document.querySelectorAll('.gif-item');
    const lastGif = gifItems[gifItems.length - 1];

    const lastObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          indicator.classList.add('hidden');
        } else {
          indicator.classList.remove('hidden');
        }
      });
    }, { threshold: 0.3 });

    lastObserver.observe(lastGif);
  </script>
