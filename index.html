<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { background: #000; }

    .gif-item {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .gif-item.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .gif-item img {
      max-width: 500px;
      max-height: 350px;
      border-radius: 8px;
      object-fit: contain;
    }
  </style>
</head>
<body>

  <div class="gif-item">
    <img src="https://i.makeagif.com/media/12-02-2014/F1EuPg.gif" alt="gif 1">
  </div>

  <div class="gif-item">
    <img src="https://i.imgur.com/5ovtvUo.gif" alt="gif 2">
  </div>

  <div class="gif-item">
    <img src="https://media1.tenor.com/m/T9T9eacSsa8AAAAd/shocked-drumsy.gif" alt="gif 3">
  </div>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        } else {
          entry.target.classList.remove('visible'); // fades out when you scroll past
        }
      });
    }, { threshold: 0.3 });

    document.querySelectorAll('.gif-item').forEach(el => observer.observe(el));
  </script>

</body>
</html>
